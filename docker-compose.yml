version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_MODEL_NAME=gemini-2.5-flash
      - DATABASE_NAME=health_informative.db
      - PROJECT_NAME="Patient Informatics AI Assistant"
    volumes:
      # Mount the database directory so changes persist locally
      - ./database:/app/database
      # Mount the backend code for hot reloading
      - ./backend:/app/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      # Note: This env var is used at build time by Vite. 
      # If you change this, you must rebuild the frontend image.
      - VITE_API_BASE_URL=http://localhost:8080/api/v1
    depends_on:
      - backend
    restart: always